<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>情侣升温游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;overflow-x:hidden}
.page{min-height:100vh;padding:16px}
.hidden{display:none!important}
/* 注册页 */
.register{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.register h1{font-size:36px;margin-bottom:8px}
.register p{color:#aaa;margin-bottom:30px}
.reg-input{width:280px;padding:14px;border:2px solid #444;border-radius:12px;background:#2a2a3e;color:#fff;font-size:16px;margin-bottom:16px;text-align:center;outline:none}
.reg-input:focus{border-color:#e94560}
.gender-select{display:flex;gap:16px;margin-bottom:24px}
.gender-btn{padding:14px 32px;border:2px solid #444;border-radius:12px;background:#2a2a3e;color:#fff;font-size:18px;cursor:pointer;transition:all .3s}
.gender-btn.selected{border-color:#e94560;background:#e94560}
.start-btn{padding:16px 60px;background:linear-gradient(135deg,#e94560,#c23152);border:none;border-radius:14px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,.4)}
/* 游戏列表 */
.header{text-align:center;padding:20px 0}
.header h1{font-size:28px}
.header p{color:#aaa;font-size:14px;margin-top:6px}
.game-grid{display:flex;flex-direction:column;gap:14px;padding:0 4px 100px}
.game-card{background:linear-gradient(135deg,#2a2a3e,#1f1f33);border:1px solid #333;border-radius:16px;padding:18px;cursor:pointer;transition:transform .2s}
.game-card:active{transform:scale(.97)}
.game-card .icon{font-size:32px;margin-right:12px}
.game-card .name{font-size:18px;font-weight:700}
.game-card .desc{color:#888;font-size:13px;margin-top:6px}
/* 游戏内页 */
.game-page{padding-bottom:80px}
.game-title{text-align:center;font-size:22px;font-weight:700;padding:16px 0 10px}
.game-subtitle{text-align:center;color:#aaa;font-size:13px;margin-bottom:16px}
.back-btn{position:absolute;left:0;top:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10}
/* 转盘 */
.wheel-container{display:flex;flex-direction:column;align-items:center;margin:10px 0}
.wheel-wrap{position:relative;width:320px;height:320px}
.wheel-canvas{width:320px;height:320px}
.pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:36px solid #FFD700;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.center-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;color:#1a1a2e;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(255,215,0,.5);z-index:6}
.wheel-result{text-align:center;margin:16px 0;padding:16px;background:linear-gradient(135deg,#2a2a3e,#1f1f33);border-radius:14px;border:1px solid #444;min-height:80px}
.wheel-result .punishment{font-size:17px;font-weight:700;color:#FFD700;line-height:1.6}
.wheel-result .who{font-size:14px;color:#e94560;margin-top:8px}
/* 真心话大冒险选择 */
.td-select{display:flex;gap:14px;justify-content:center;margin:20px 0}
.td-btn{flex:1;max-width:160px;padding:24px 12px;border-radius:16px;border:none;font-size:20px;font-weight:700;cursor:pointer;color:#fff;text-align:center}
.td-btn.truth{background:linear-gradient(135deg,#6c5ce7,#a29bfe)}
.td-btn.dare{background:linear-gradient(135deg,#e94560,#ff6b6b)}
/* 数字炸弹 */
.bomb-display{text-align:center;margin:20px 0}
.bomb-num{font-size:72px;font-weight:900;color:#e94560;text-shadow:0 0 20px rgba(233,69,96,.5)}
.bomb-range{color:#aaa;font-size:16px;margin-top:8px}
.bomb-input{display:flex;gap:10px;justify-content:center;margin:20px 0}
.bomb-input input{width:120px;padding:14px;border:2px solid #444;border-radius:12px;background:#2a2a3e;color:#fff;font-size:24px;text-align:center;outline:none}
.bomb-input button{padding:14px 24px;background:#e94560;border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:700;cursor:pointer}
/* 骰子 */
.dice-area{text-align:center;margin:20px 0}
.dice{display:inline-block;width:100px;height:100px;background:#fff;border-radius:16px;font-size:60px;line-height:100px;color:#1a1a2e;font-weight:900;transition:transform .3s}
.dice.rolling{animation:diceRoll .15s linear infinite}
@keyframes diceRoll{0%{transform:rotate(0)}25%{transform:rotate(90deg)}50%{transform:rotate(180deg)}75%{transform:rotate(270deg)}100%{transform:rotate(360deg)}}
.roll-btn{display:block;margin:20px auto;padding:16px 50px;background:linear-gradient(135deg,#e94560,#c23152);border:none;border-radius:14px;color:#fff;font-size:20px;font-weight:700;cursor:pointer}
/* 国王游戏 */
.king-cards{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}
.king-card{width:64px;height:90px;background:linear-gradient(135deg,#2a2a3e,#3d3d5c);border:2px solid #555;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all .3s}
.king-card.revealed{background:linear-gradient(135deg,#FFD700,#FF8C00);border-color:#FFD700}
.king-result{text-align:center;margin:16px 0;padding:16px;background:#2a2a3e;border-radius:14px;border:1px solid #444}
/* 你比我猜 */
.guess-word{text-align:center;font-size:28px;font-weight:900;margin:20px 0;padding:30px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:16px;min-height:100px;display:flex;align-items:center;justify-content:center}
.guess-timer{text-align:center;font-size:48px;font-weight:900;color:#FFD700;margin:10px 0}
.guess-btns{display:flex;gap:14px;justify-content:center}
.guess-btns button{flex:1;padding:16px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;color:#fff}
.guess-btns .correct{background:#27ae60}
.guess-btns .skip{background:#e67e22}
.guess-score{text-align:center;font-size:20px;margin:10px 0}
/* 心跳告白 */
.hb-stage{text-align:center;margin:16px 0;padding:20px;background:linear-gradient(135deg,#2a2a3e,#1f1f33);border-radius:16px;border:1px solid #444}
.hb-stage .title{font-size:20px;font-weight:700;margin-bottom:8px}
.hb-stage .desc{color:#aaa;font-size:14px}
.hb-timer{font-size:64px;font-weight:900;text-align:center;color:#e94560;margin:20px 0}
.hb-progress{display:flex;gap:8px;justify-content:center;margin:16px 0}
.hb-dot{width:12px;height:12px;border-radius:50%;background:#444}
.hb-dot.active{background:#e94560}
.hb-dot.done{background:#27ae60}
/* 石头剪刀布 */
.rps-choice{display:flex;gap:20px;justify-content:center;margin:20px 0}
.rps-item{font-size:64px;cursor:pointer;transition:transform .2s}
.rps-item:active{transform:scale(1.2)}
.rps-result{text-align:center;font-size:20px;font-weight:700;margin:16px 0;padding:20px;background:#2a2a3e;border-radius:14px}
/* 蒙眼寻宝 */
.mystery-area{text-align:center;margin:20px 0}
.mystery-btn{display:inline-block;padding:16px 32px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border:none;border-radius:14px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin:8px}
.body-parts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.body-part{padding:14px 8px;background:#2a2a3e;border:2px solid #444;border-radius:12px;text-align:center;font-size:14px;cursor:pointer;transition:all .2s}
.body-part:active{border-color:#e94560;background:#3d1f2e}
/* 惩罚转盘 */
.punish-result{text-align:center;margin:16px 0;padding:20px;background:linear-gradient(135deg,#2a2a3e,#1f1f33);border-radius:14px;border:1px solid #FFD700}
.punish-result .text{font-size:18px;font-weight:700;color:#FFD700}
.punish-result .who{color:#e94560;margin-top:8px;font-size:15px}
/* 悄悄话 */
.whisper-card{text-align:center;margin:20px 0;padding:30px;background:linear-gradient(135deg,#2a2a3e,#1f1f33);border-radius:16px;border:1px solid #444;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.whisper-card .text{font-size:18px;line-height:1.8}
/* 传纸条 */
.tissue-area{text-align:center;margin:20px 0}
.tissue-progress{width:200px;height:20px;background:#333;border-radius:10px;margin:16px auto;overflow:hidden}
.tissue-bar{height:100%;background:linear-gradient(90deg,#e94560,#FFD700);border-radius:10px;transition:width .5s}
.tissue-btn{padding:16px 40px;background:#e94560;border:none;border-radius:14px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin:16px 8px}
/* 玩家条 */
.players-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.player-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.player-tag.male{background:#1e3a5f;color:#74b9ff}
.player-tag.female{background:#3d1f2e;color:#fd79a8}
/* 惩罚列表页 */
.penalty-list{margin:16px 0}
.penalty-item{padding:12px 16px;background:#2a2a3e;border-radius:12px;margin-bottom:8px;border-left:4px solid #e94560}
.penalty-item .stars{color:#FFD700;margin-right:8px}
.penalty-item .text{font-size:14px}
/* 结果弹窗 */
.result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100}
.result-box{background:linear-gradient(135deg,#2a2a3e,#1a1a2e);border:2px solid #e94560;border-radius:20px;padding:30px;text-align:center;max-width:320px;width:90%}
.result-box .emoji{font-size:64px;margin-bottom:12px}
.result-box .text{font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.5}
.result-box .sub{color:#aaa;font-size:14px;margin-bottom:20px}
.result-box button{padding:12px 40px;background:#e94560;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .4s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 1s infinite}
</style>
</head>
<body>
